name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stamp the service-worker cache version with the short commit SHA so
      # sw.js changes on every deploy — the browser re-caches and picks up the
      # new build without any manual VERSION bump.
      - name: Stamp service-worker version
        run: |
          sed -i "s/const VERSION = '.*';/const VERSION = 'cb-${GITHUB_SHA::7}';/" sw.js
          echo "Stamped:" && grep "const VERSION" sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
